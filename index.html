<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intestino Sano | Guía Práctica por Gastón García</title>
    <meta name="description" content="Recupera tu bienestar digestivo con métodos probados.">
    <meta name="author" content="Gastón García">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; overflow-x: hidden; }
        h1 { font-family: 'Space Grotesk', sans-serif; }
        .reveal { opacity: 0; transform: translateY(30px); }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
        }
        .text-gradient {
            background: linear-gradient(135deg, #6ee7b7 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-pay {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }
        .btn-pay:hover { transform: scale(1.05); box-shadow: 0 20px 30px -5px rgba(16, 185, 129, 0.5); }
        #tsparticles { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        
        /* Forzamos la desaparición de cualquier elemento inyectado externamente */
        [id*="lovable"], [class*="lovable"], iframe[src*="lovable"] {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="tsparticles"></div>

    <main class="glass-card reveal max-w-2xl w-full p-8 md:p-12 text-center shadow-2xl z-10">
        <header class="mb-8">
            <span class="text-emerald-400 font-bold uppercase tracking-widest text-sm border border-emerald-400/20 px-4 py-1 rounded-full bg-emerald-400/5">
                Acceso Inmediato
            </span>
        </header>

        <h1 class="text-4xl md:text-6xl font-extrabold mb-6 leading-tight text-white">
            Tu camino a un <span class="text-gradient">Intestino Sano</span>
        </h1>

        <p class="text-slate-400 text-lg md:text-xl mb-10 leading-relaxed">
            Adquirí la guía definitiva y empezá hoy mismo a transformar tu salud digestiva con métodos probados.
        </p>

        <div class="space-y-6">
            <a href="https://www.mercadopago.com.ar/checkout/v1/payment/redirect/219ecb50-edeb-4e9e-997c-e5bc77c008df/payment-option-form/?source=link&preference-id=684332173-ae260c06-beec-4c1e-a6be-8b24173518d5&router-request-id=81e88c88-2e5a-420a-9d11-9860f07e4792&p=0aca0b046d91866b1bccfe5f249c5b5e" 
               class="btn-pay inline-block w-full py-5 rounded-2xl text-white font-extrabold text-xl">
                Comprar por Mercado Pago
            </a>
            
            <p class="text-slate-500 text-sm flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                Transacción segura — Envío digital al instante
            </p>
        </div>

        <footer class="mt-12 pt-8 border-t border-white/5">
            <p class="text-xs text-slate-600 uppercase tracking-widest font-semibold">
                Desarrollado por Gastón García
            </p>
        </footer>
    </main>

    <script>
        // Animación de entrada cinematográfica
        window.addEventListener('load', () => {
            gsap.to(".reveal", { opacity: 1, y: 0, duration: 1.5, ease: "power4.out" });
        });

        // Partículas dinámicas (Más visibles)
        tsParticles.load("tsparticles", {
            particles: {
                color: { value: "#10b981" },
                links: { color: "#10b981", distance: 150, enable: true, opacity: 0.3, width: 1 },
                move: { enable: true, speed: 0.8 },
                number: { value: 45, density: { enable: true, area: 800 } },
                opacity: { value: 0.4 },
                size: { value: { min: 1, max: 2 } }
            },
            detectRetina: true,
        });
    </script>
</body>
</html>
